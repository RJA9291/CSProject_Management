<title>Relocation Command · Gamuda Rawang</title>
<style>
/* ============ TOKENS ============ */
:root{
  --bg:#eef1f5; --surface:#ffffff; --surface-2:#f5f7fa; --line:#dfe4ea; --line-2:#eaeef3;
  --ink:#1a2432; --ink-2:#4a5769; --ink-3:#7a8798; --ink-inv:#ffffff;
  --accent:#1e6fa8; --accent-ink:#155a8a; --accent-soft:#e3eef6;
  --a:#e0951a; --a-soft:#f8ecd3;      /* Block A amber */
  --b:#3b82c4; --b-soft:#dfeaf6;      /* Block B blue  */
  --key:#d64541;                      /* key date red  */
  --ok:#2e9e6b; --ok-soft:#dcefe5;
  --warn:#e0951a; --warn-soft:#f8ecd3;
  --wait:#8a7fce; --wait-soft:#e9e6f7;
  --idle:#95a2b3; --idle-soft:#e9edf2;
  --shadow:0 1px 2px rgba(20,35,55,.06),0 4px 14px rgba(20,35,55,.06);
  --shadow-lg:0 8px 30px rgba(20,35,55,.14);
  --radius:12px; --radius-sm:8px;
  --mono:ui-monospace,"SF Mono","Cascadia Code","Segoe UI Mono",Consolas,monospace;
  --sans:system-ui,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
@media (prefers-color-scheme:dark){
  :root{
    --bg:#0d141d; --surface:#141d29; --surface-2:#101823; --line:#26323f; --line-2:#1d2733;
    --ink:#e6ecf3; --ink-2:#a7b4c4; --ink-3:#6f7f92; --ink-inv:#0d141d;
    --accent:#4d9fd6; --accent-ink:#7cbce6; --accent-soft:#16344a;
    --a:#e6a531; --a-soft:#3a2f16; --b:#5297d6; --b-soft:#16304a; --key:#f0605b;
    --ok:#3fb37d; --ok-soft:#123026; --warn:#e6a531; --warn-soft:#3a2f16;
    --wait:#9d92e0; --wait-soft:#241f3a; --idle:#7a8797; --idle-soft:#1c2632;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 6px 18px rgba(0,0,0,.32);
    --shadow-lg:0 10px 34px rgba(0,0,0,.5);
  }
}
:root[data-theme="light"]{
  --bg:#eef1f5; --surface:#ffffff; --surface-2:#f5f7fa; --line:#dfe4ea; --line-2:#eaeef3;
  --ink:#1a2432; --ink-2:#4a5769; --ink-3:#7a8798; --ink-inv:#ffffff;
  --accent:#1e6fa8; --accent-ink:#155a8a; --accent-soft:#e3eef6;
  --a:#e0951a; --a-soft:#f8ecd3; --b:#3b82c4; --b-soft:#dfeaf6; --key:#d64541;
  --ok:#2e9e6b; --ok-soft:#dcefe5; --warn:#e0951a; --warn-soft:#f8ecd3;
  --wait:#8a7fce; --wait-soft:#e9e6f7; --idle:#95a2b3; --idle-soft:#e9edf2;
  --shadow:0 1px 2px rgba(20,35,55,.06),0 4px 14px rgba(20,35,55,.06);
  --shadow-lg:0 8px 30px rgba(20,35,55,.14);
}
:root[data-theme="dark"]{
  --bg:#0d141d; --surface:#141d29; --surface-2:#101823; --line:#26323f; --line-2:#1d2733;
  --ink:#e6ecf3; --ink-2:#a7b4c4; --ink-3:#6f7f92; --ink-inv:#0d141d;
  --accent:#4d9fd6; --accent-ink:#7cbce6; --accent-soft:#16344a;
  --a:#e6a531; --a-soft:#3a2f16; --b:#5297d6; --b-soft:#16304a; --key:#f0605b;
  --ok:#3fb37d; --ok-soft:#123026; --warn:#e6a531; --warn-soft:#3a2f16;
  --wait:#9d92e0; --wait-soft:#241f3a; --idle:#7a8797; --idle-soft:#1c2632;
  --shadow:0 1px 2px rgba(0,0,0,.4),0 6px 18px rgba(0,0,0,.32);
  --shadow-lg:0 10px 34px rgba(0,0,0,.5);
}
*{box-sizing:border-box}
body{margin:0}
#app{
  font-family:var(--sans); background:var(--bg); color:var(--ink);
  min-height:100vh; line-height:1.45; -webkit-font-smoothing:antialiased;
  font-size:14px;
}
#app *{box-sizing:border-box}
.tnum{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
h1,h2,h3{margin:0;text-wrap:balance;font-weight:650}
button{font-family:inherit;cursor:pointer}
::selection{background:var(--accent-soft)}

/* ============ HEADER ============ */
.hdr{
  position:sticky; top:0; z-index:40; background:color-mix(in srgb,var(--surface) 88%,transparent);
  backdrop-filter:saturate(1.4) blur(10px); border-bottom:1px solid var(--line);
}
.hdr-in{max-width:1320px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:12px;min-width:0}
.mark{
  width:38px;height:38px;border-radius:10px;flex:none;display:grid;place-items:center;
  background:linear-gradient(135deg,var(--accent),var(--accent-ink));color:#fff;
  font-weight:800;font-size:15px;letter-spacing:.5px;box-shadow:var(--shadow)
}
.brand h1{font-size:16px;letter-spacing:-.2px;line-height:1.1}
.route{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--ink-3);margin-top:2px;
  text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.route b{color:var(--ink-2);font-weight:650}
.route .arw{color:var(--accent)}
.hdr-sp{flex:1}
.hbtns{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.ic{
  height:34px;padding:0 12px;border:1px solid var(--line);background:var(--surface);color:var(--ink-2);
  border-radius:9px;font-size:12.5px;font-weight:600;display:inline-flex;align-items:center;gap:6px;
  transition:.15s;white-space:nowrap
}
.ic:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
.ic.sq{width:34px;padding:0;justify-content:center}

/* ============ TABS ============ */
.tabs{max-width:1320px;margin:0 auto;padding:0 20px;display:flex;gap:2px;overflow-x:auto;
  border-bottom:1px solid var(--line);scrollbar-width:thin}
.tab{
  border:0;background:none;color:var(--ink-3);padding:13px 15px 11px;font-size:13.5px;font-weight:600;
  border-bottom:2.5px solid transparent;white-space:nowrap;transition:.15s;position:relative;top:1px
}
.tab:hover{color:var(--ink)}
.tab.on{color:var(--accent);border-bottom-color:var(--accent)}
.tab .n{font-size:11px;color:var(--ink-3);margin-left:5px;font-variant-numeric:tabular-nums;font-weight:600}
.tab.on .n{color:var(--accent)}

/* ============ LAYOUT ============ */
main{max-width:1320px;margin:0 auto;padding:22px 20px 60px}
.view{display:none;animation:fade .3s ease}
.view.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
.eyebrow{text-transform:uppercase;letter-spacing:1.3px;font-size:10.5px;font-weight:700;color:var(--ink-3)}
.sec-h{display:flex;align-items:baseline;gap:12px;margin:0 0 14px;flex-wrap:wrap}
.sec-h h2{font-size:17px}
.sec-h .sub{font-size:12.5px;color:var(--ink-3)}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}

/* ============ KPI ============ */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:22px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px;
  box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent)}
.kpi.a::before{background:var(--a)} .kpi.b::before{background:var(--b)}
.kpi.ok::before{background:var(--ok)} .kpi.key::before{background:var(--key)}
.kpi .lab{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-3);font-weight:650}
.kpi .val{font-size:25px;font-weight:750;letter-spacing:-.5px;margin-top:5px;font-variant-numeric:tabular-nums}
.kpi .val small{font-size:14px;font-weight:600;color:var(--ink-3)}
.kpi .foot{font-size:11.5px;color:var(--ink-2);margin-top:3px}

/* ============ GRID PANELS ============ */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid2-a{display:grid;grid-template-columns:1.4fr 1fr;gap:16px}
@media(max-width:820px){.grid2,.grid2-a{grid-template-columns:1fr}}
.panel{padding:18px}
.panel-h{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:14px}
.panel-h h3{font-size:14px}
.panel-h .hint{font-size:11.5px;color:var(--ink-3)}

/* ============ PHASE / STACK BARS ============ */
.stack{display:flex;flex-direction:column;gap:13px}
.srow{display:grid;grid-template-columns:74px 1fr 92px;align-items:center;gap:12px}
.srow .pl{font-size:12.5px;font-weight:600;color:var(--ink-2)}
.track{height:22px;border-radius:6px;background:var(--surface-2);overflow:hidden;display:flex;border:1px solid var(--line-2)}
.seg{height:100%;display:flex;align-items:center;transition:width .6s cubic-bezier(.4,0,.2,1)}
.seg.a{background:var(--a)} .seg.b{background:var(--b)}
.srow .amt{text-align:right;font-family:var(--mono);font-size:12.5px;font-weight:600;color:var(--ink)}
.lgnd{display:flex;gap:16px;flex-wrap:wrap;margin-top:4px}
.lgnd span{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--ink-2)}
.dot{width:11px;height:11px;border-radius:3px;flex:none}
.dot.a{background:var(--a)} .dot.b{background:var(--b)} .dot.key{background:var(--key)}
.dot.ok{background:var(--ok)} .dot.warn{background:var(--warn)} .dot.wait{background:var(--wait)} .dot.idle{background:var(--idle)}

/* donut */
.donut-wrap{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.donut{position:relative;width:132px;height:132px;flex:none}
.donut .ctr{position:absolute;inset:0;display:grid;place-content:center;text-align:center}
.donut .ctr b{font-size:20px;font-weight:750;letter-spacing:-.5px}
.donut .ctr span{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-3);font-weight:650}
.dleg{display:flex;flex-direction:column;gap:9px;flex:1;min-width:140px}
.dleg .li{display:flex;align-items:center;gap:9px;font-size:12.5px}
.dleg .li .nm{flex:1;color:var(--ink-2)}
.dleg .li .vv{font-family:var(--mono);font-weight:650;font-size:12px}

/* ============ KEY DATES ============ */
.kd{display:flex;flex-direction:column}
.kd .row{display:grid;grid-template-columns:88px 1fr auto;gap:12px;align-items:center;padding:10px 0;border-top:1px solid var(--line-2)}
.kd .row:first-child{border-top:0}
.kd .dt{font-family:var(--mono);font-size:12px;font-weight:650;color:var(--accent)}
.kd .ti{font-size:13px;font-weight:600}
.kd .pic{font-size:11.5px;color:var(--ink-3);margin-top:1px}
.kd .rmk{grid-column:2/4;font-size:11.5px;color:var(--ink-3);margin-top:-4px}

/* ============ GANTT ============ */
.gt-ctl{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.chipset{display:flex;gap:5px;background:var(--surface-2);padding:3px;border-radius:9px;border:1px solid var(--line)}
.chip{border:0;background:none;color:var(--ink-2);padding:6px 11px;border-radius:7px;font-size:12px;font-weight:600;transition:.15s}
.chip.on{background:var(--surface);color:var(--accent);box-shadow:var(--shadow)}
.gt-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow)}
.gt{min-width:940px;--lab:236px;--wk:30px}
.gt-head{position:sticky;top:0;z-index:6;background:var(--surface);border-bottom:1.5px solid var(--line)}
.gt-months,.gt-weeks{display:grid;grid-template-columns:var(--lab) repeat(24,var(--wk))}
.gt-months>div{padding:7px 0 4px;text-align:center;font-size:10.5px;font-weight:700;letter-spacing:.6px;
  text-transform:uppercase;color:var(--ink-2);border-left:1px solid var(--line-2)}
.gt-months>.mlab{border-left:0;text-align:left;padding-left:16px;color:var(--ink-3);text-transform:none;letter-spacing:0;font-weight:600}
.gt-weeks>div{padding:3px 0 6px;text-align:center;font-size:10px;font-weight:600;color:var(--ink-3);
  border-left:1px solid var(--line-2);font-variant-numeric:tabular-nums}
.gt-weeks>.wlab{border-left:0}
.gt-body .g-grp{border-top:1px solid var(--line)}
.g-grp-h{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--surface-2);cursor:pointer;
  position:sticky;left:0;font-size:12px;font-weight:700;color:var(--ink);letter-spacing:.2px}
.g-grp-h .tw{color:var(--ink-3);transition:transform .2s;font-size:10px}
.g-grp-h.col .tw{transform:rotate(-90deg)}
.g-grp-h .cnt{margin-left:auto;font-size:10.5px;color:var(--ink-3);font-weight:600;font-variant-numeric:tabular-nums}
.g-rows{}
.g-rows.hide{display:none}
.g-row{display:grid;grid-template-columns:var(--lab) 1fr;border-top:1px solid var(--line-2);min-height:30px}
.g-row:hover{background:var(--surface-2)}
.g-lab{padding:5px 10px 5px 14px;display:flex;align-items:center;gap:8px;min-width:0;position:sticky;left:0;
  background:inherit;z-index:2}
.g-row:hover .g-lab{background:var(--surface-2)}
.g-lab .st{width:9px;height:9px;border-radius:50%;flex:none;border:1.5px solid var(--idle);cursor:pointer}
.g-lab .st.ok{background:var(--ok);border-color:var(--ok)}
.g-lab .st.prog{background:var(--b);border-color:var(--b)}
.g-lab .st.wait{background:var(--warn);border-color:var(--warn)}
.g-lab .st.no{background:transparent;border-color:var(--idle)}
.g-lab .tx{font-size:12px;color:var(--ink-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.g-lab .tx.sub{color:var(--ink-3);padding-left:2px}
.g-track{position:relative;display:grid;grid-template-columns:repeat(24,var(--wk));align-items:center}
.g-track>.cell{border-left:1px solid var(--line-2);height:100%}
.g-bar{position:absolute;height:15px;border-radius:5px;top:50%;transform:translateY(-50%);
  display:flex;align-items:center;box-shadow:inset 0 0 0 1px rgba(255,255,255,.15);cursor:default}
.g-bar.a{background:var(--a)} .g-bar.b{background:var(--b)}
.g-bar.key{background:transparent;box-shadow:none}
.g-diamond{position:absolute;top:50%;width:11px;height:11px;background:var(--key);transform:translate(-50%,-50%) rotate(45deg);
  border-radius:2px;box-shadow:0 0 0 2px var(--surface)}
.g-key-line{position:absolute;top:2px;bottom:2px;border-left:1.5px dashed var(--key);opacity:.4}

/* ============ TABLE ============ */
.tbl-ctl{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.srch{height:34px;padding:0 12px;border:1px solid var(--line);border-radius:9px;background:var(--surface);
  color:var(--ink);font-size:13px;font-family:inherit;min-width:180px;flex:1;max-width:280px}
.srch:focus{outline:2px solid var(--accent-soft);border-color:var(--accent)}
.tbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow)}
table{border-collapse:collapse;width:100%;min-width:640px;font-size:12.5px}
thead th{position:sticky;top:0;background:var(--surface-2);text-align:left;padding:10px 12px;font-size:11px;
  text-transform:uppercase;letter-spacing:.5px;color:var(--ink-3);font-weight:700;border-bottom:1px solid var(--line);white-space:nowrap;z-index:2}
thead th.num{text-align:right}
tbody td{padding:10px 12px;border-bottom:1px solid var(--line-2);color:var(--ink-2);vertical-align:top}
tbody tr:hover{background:var(--surface-2)}
td.num{text-align:right;font-family:var(--mono);color:var(--ink);font-weight:600;white-space:nowrap}
td.loc{color:var(--ink);font-weight:600}
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:700;letter-spacing:.2px;white-space:nowrap}
.pill.p1{background:var(--accent-soft);color:var(--accent-ink)}
.pill.p2{background:var(--a-soft);color:var(--a)}
.pill.p3{background:var(--wait-soft);color:var(--wait)}
.pill.na{background:var(--idle-soft);color:var(--idle)}
.pill.rel{background:var(--b-soft);color:var(--b)}
.pill.buy{background:var(--ok-soft);color:var(--ok)}
tfoot td{padding:12px;font-weight:750;border-top:2px solid var(--line);background:var(--surface-2)}
tfoot td.num{font-size:14px}

/* ============ STAKEHOLDERS ============ */
.lop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.lop{padding:16px;display:flex;flex-direction:column;gap:10px}
.lop-h{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.lop-h .nm{font-size:14px;font-weight:700}
.lop-h .tag{font-size:10px;font-weight:800;color:var(--accent);background:var(--accent-soft);
  padding:3px 8px;border-radius:6px;letter-spacing:.4px;white-space:nowrap}
.lop .pics{font-size:11.5px;color:var(--ink-3)}
.lop .pics b{color:var(--ink-2);font-weight:600}
.lop ul{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:8px}
.lop li{font-size:12px;color:var(--ink-2);padding-left:14px;position:relative;line-height:1.4}
.lop li::before{content:"";position:absolute;left:0;top:6px;width:6px;height:6px;border-radius:50%;background:var(--accent);opacity:.5}
.lop .tgt{margin-top:auto;padding-top:8px;border-top:1px solid var(--line-2);font-size:11.5px;display:flex;gap:6px;align-items:center}
.lop .tgt b{font-family:var(--mono);color:var(--key);font-weight:650}

/* ============ HIRING ============ */
.hire-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:820px){.hire-grid{grid-template-columns:1fr}}
.hbar{display:flex;flex-direction:column;gap:16px;padding:18px}
.hb{display:flex;flex-direction:column;gap:6px}
.hb .top{display:flex;justify-content:space-between;align-items:baseline;font-size:12.5px}
.hb .top .lv{font-weight:700}
.hb .top .fig{font-family:var(--mono);font-weight:650;color:var(--ink-2)}
.hb .top .fig b{color:var(--ink)}
.hb .trk{height:26px;background:var(--surface-2);border:1px solid var(--line-2);border-radius:7px;overflow:hidden;position:relative}
.hb .fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-ink));border-radius:6px 0 0 6px;
  display:flex;align-items:center;justify-content:flex-end;padding-right:8px;color:#fff;font-size:11px;font-weight:700;
  transition:width .7s cubic-bezier(.4,0,.2,1)}
.hb .dept{font-size:11px;color:var(--ink-3)}
.var-ok{color:var(--ok);font-weight:700} .var-gap{color:var(--warn);font-weight:700}

/* ============ EQUIP ============ */
.eq-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.eq{padding:15px}
.eq h3{font-size:12.5px;color:var(--accent);margin-bottom:10px;text-transform:uppercase;letter-spacing:.4px;
  padding-bottom:8px;border-bottom:1px solid var(--line-2)}
.eq .er{display:flex;justify-content:space-between;gap:10px;font-size:12px;padding:5px 0;color:var(--ink-2)}
.eq .er .q{font-family:var(--mono);font-weight:650;color:var(--ink);white-space:nowrap}

.foot{max-width:1320px;margin:0 auto;padding:22px 20px;color:var(--ink-3);font-size:11.5px;
  border-top:1px solid var(--line);display:flex;gap:14px;flex-wrap:wrap;justify-content:space-between}
.foot a{color:var(--accent);text-decoration:none}
.note{font-size:11.5px;color:var(--ink-3);margin-top:8px}
.empty{padding:30px;text-align:center;color:var(--ink-3);font-size:13px}
input[type=file]{display:none}
@media(max-width:600px){
  .hdr-in{padding:10px 14px} main{padding:16px 14px 50px} .tabs{padding:0 14px}
  .kpi .val{font-size:22px} .brand h1{font-size:14px}
}
</style>

<div id="app">
  <header class="hdr">
    <div class="hdr-in">
      <div class="brand">
        <div class="mark">GR</div>
        <div>
          <h1>Relocation Command</h1>
          <div class="route"><b>Shah Alam</b><span class="arw">→</span><b>Kundang Jaya, Rawang</b></div>
        </div>
      </div>
      <div class="hdr-sp"></div>
      <div class="hbtns">
        <button class="ic" id="exportBtn" title="Download your status backup as JSON">↓ Backup</button>
        <button class="ic" id="importBtn" title="Restore a status backup">↑ Restore</button>
        <input type="file" id="fileIn" accept="application/json">
        <button class="ic sq" id="themeBtn" title="Toggle light / dark">◐</button>
      </div>

try{const s=JSON.parse(localStorage.getItem(LS));if(s)ST=Object.assign(ST,s);}catch(e){}
const save=()=>{try{localStorage.setItem(LS,JSON.stringify(ST));}catch(e){}};

/* ---- theme ---- */
function applyTheme(){
  if(ST.theme) document.documentElement.setAttribute('data-theme',ST.theme);
  else document.documentElement.removeAttribute('data-theme');
}
$('#themeBtn').onclick=()=>{
  const cur=ST.theme|| (matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
  ST.theme=cur==='dark'?'light':'dark';applyTheme();save();
};
applyTheme();

/* ---- week / month scaffolding ---- */
const W0=28, W1=51;               // week span shown on the gantt
const WEEKS=[]; for(let w=W0;w<=W1;w++) WEEKS.push(w);
const MONTHS=[['JUL',28,31],['AUG',32,35],['SEP',36,39],['OCT',40,43],['NOV',44,47],['DEC',48,51]];

/* ---- status model ---- */
const STAT=[
  {k:'no',  label:'Not set',     cls:'no'},
  {k:'ok',  label:'Completed',   cls:'ok'},
  {k:'prog',label:'In Progress', cls:'prog'},
  {k:'wait',label:'Pending',     cls:'wait'},
];
const statOf=id=> ST.status[id]||'no';
const cycle=id=>{const cur=statOf(id);const i=STAT.findIndex(s=>s.k===cur);ST.status[id]=STAT[(i+1)%STAT.length].k;save();};

/* =================================================================== TABS */
const TABS=[
  ['overview','Overview'],
  ['timeline','Timeline'],
  ['budget','Budget'],
  ['stakeholders','Stakeholders'],
  ['hiring','Hiring'],
  ['bq','BQ & Equipment'],
];
const counts={
  timeline:DATA.timelineMain.filter(x=>x.s).length,
  budget:DATA.costA.length+DATA.costB.length,
  stakeholders:DATA.lop.length,
  bq:DATA.equipment.length,
};
const tabsN=$('#tabs');
TABS.forEach(([k,l])=>{
  const b=el('button','tab',esc(l)+(counts[k]?` <span class="n">${counts[k]}</span>`:''));
  b.dataset.k=k; b.onclick=()=>go(k); tabsN.appendChild(b);
});
function go(k){
  ST.tab=k;save();
  $$('.tab',tabsN).forEach(t=>t.classList.toggle('on',t.dataset.k===k));
  $$('.view').forEach(v=>v.classList.toggle('on',v.dataset.v===k));
  if(!rendered[k]){renderers[k]();rendered[k]=true;}
  window.scrollTo({top:0,behavior:'instant'});
}
const rendered={}, renderers={};

/* =================================================================== OVERVIEW */
renderers.overview=function(){
  const v=$('#v-overview');const B=DATA.budget;
  const tot=DATA.timelineMain.filter(x=>x.s);
  const done=tot.filter(x=>statOf('m'+DATA.timelineMain.indexOf(x))==='ok').length;
  const hc=DATA.headcount.reduce((a,h)=>({rto:a.rto+(h.rto||0),hired:a.hired+(h.hired||0)}),{rto:0,hired:0});
  const kpis=[
    {c:'',   lab:'Total Budget', val:rm(B.total), foot:'Block A + Block B, all phases'},
    {c:'a',  lab:'Block A', val:rmk(B.blockA), foot:'Lot 39058 · '+Math.round(B.blockA/B.total*100)+'% of spend'},
    {c:'b',  lab:'Block B', val:rmk(B.blockB), foot:'Lot 39059 · '+Math.round(B.blockB/B.total*100)+'% of spend'},
    {c:'key',lab:'Schedule', val:'Jul–Dec', foot:'2026 · weeks 28–51 ('+(tot.length)+' activities)'},
    {c:'ok', lab:'Hiring Filled', val:Math.round(hc.hired/hc.rto*100)+'%', foot:hc.hired+' of '+hc.rto+' positions'},
  ];
  let h=`<div class="kpis">`+kpis.map(k=>`<div class="kpi ${k.c}">
     <div class="lab">${k.lab}</div><div class="val">${k.val}</div><div class="foot">${k.foot}</div></div>`).join('')+`</div>`;

  /* phase stack + donut */
  const ph=B.phases, maxPh=Math.max(ph.A.P1+ph.B.P1,ph.A.P2+ph.B.P2,ph.A.P3+ph.B.P3);
  const prow=(lab,a,b)=>{const t=a+b;const w=t/maxPh*100;
    return `<div class="srow"><div class="pl">${lab}</div>
      <div class="track">
        ${a?`<div class="seg a" style="width:${a/maxPh*100}%" title="Block A ${rm(a)}"></div>`:''}
        ${b?`<div class="seg b" style="width:${b/maxPh*100}%" title="Block B ${rm(b)}"></div>`:''}
      </div><div class="amt">${rmk(t)}</div></div>`;};

  h+=`<div class="grid2-a" style="margin-bottom:16px">
    <div class="card panel">
      <div class="panel-h"><h3>Budget by phase</h3><span class="hint">stacked A / B · scaled to largest phase</span></div>
      <div class="stack">
        ${prow('Phase 1',ph.A.P1,ph.B.P1)}
        ${prow('Phase 2',ph.A.P2,ph.B.P2)}
        ${prow('Phase 3',ph.A.P3,ph.B.P3)}
      </div>
      <div class="lgnd"><span><i class="dot a"></i>Block A</span><span><i class="dot b"></i>Block B</span></div>
      <p class="note">Phase 1 + Phase 2 committed spend totals RM 588,000; Phase 3 adds RM 86,500.</p>
    </div>
    <div class="card panel">
      <div class="panel-h"><h3>Block split</h3></div>
      <div class="donut-wrap">
        ${donut([['Block A',B.blockA,'var(--a)'],['Block B',B.blockB,'var(--b)']],B.total,rmk(B.total))}
      </div>
    </div>
  </div>`;

  /* key dates */
  const keys=DATA.timelineMain.filter(x=>x.due).slice(0,10);
  h+=`<div class="grid2-a">
    <div class="card panel">
      <div class="panel-h"><h3>Key regulatory & legal dates</h3><span class="hint">critical path to production</span></div>
      <div class="kd">${keys.map(k=>`<div class="row">
        <span class="dt">${fmtDate(k.due)}</span>
        <div><div class="ti">${esc(k.act)}</div><div class="pic">${esc(k.pic||'—')}</div>
          ${k.rmk?`<div class="rmk">${esc(k.rmk)}</div>`:''}</div>
        <span class="pill ${pillCat(k.cat)}">${esc(shortCat(k.cat))}</span></div>`).join('')}</div>
    </div>
    <div class="card panel">
      <div class="panel-h"><h3>Work by area</h3><span class="hint">scheduled activities</span></div>
      ${catBars()}
    </div>
  </div>`;
  v.innerHTML=h;
};
function catBars(){
  const groups={};
  DATA.timelineMain.forEach(x=>{if(x.s){const c=x.cat||'—';groups[c]=(groups[c]||0)+1;}});
  const arr=Object.entries(groups).sort((a,b)=>b[1]-a[1]);
  const mx=Math.max(...arr.map(a=>a[1]));
  return `<div class="stack">`+arr.map(([c,n])=>`<div class="srow" style="grid-template-columns:130px 1fr 34px">
    <div class="pl" style="font-size:11.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${esc(c)}">${esc(shortCat(c))}</div>
    <div class="track"><div class="seg" style="width:${n/mx*100}%;background:var(--accent)"></div></div>
    <div class="amt">${n}</div></div>`).join('')+`</div>`;
}
function donut(parts,total,center){
  const R=54,C=2*Math.PI*R;let off=0;
  const segs=parts.map(([nm,val,col])=>{const frac=val/total;const len=frac*C;
    const s=`<circle r="${R}" cx="66" cy="66" fill="none" stroke="${col}" stroke-width="20"
      stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 66 66)"/>`;
    off+=len;return s;}).join('');
  const leg=parts.map(([nm,val,col])=>`<div class="li"><i class="dot" style="background:${col}"></i>
    <span class="nm">${nm}</span><span class="vv">${rmk(val)}</span></div>`).join('');
  return `<div class="donut"><svg viewBox="0 0 132 132" width="132" height="132">
    <circle r="${R}" cx="66" cy="66" fill="none" stroke="var(--line)" stroke-width="20"/>${segs}</svg>
    <div class="ctr"><b>${center}</b><span>total</span></div></div><div class="dleg">${leg}</div>`;
}

/* =================================================================== TIMELINE (GANTT) */
renderers.timeline=function(){
  const v=$('#v-timeline');
  v.innerHTML=`
    <div class="sec-h"><span class="eyebrow">Master schedule</span><h2>Relocation timeline</h2>
      <span class="sub">weeks 28–51 · 2026 · click a status dot to mark progress</span></div>
    <div class="gt-ctl">
      <div class="chipset" id="gtFilter">
        <button class="chip" data-f="all">All work</button>
        <button class="chip" data-f="a">Block A</button>
        <button class="chip" data-f="b">Block B</button>
        <button class="chip" data-f="key">Key dates</button>
      </div>
      <div class="hdr-sp" style="flex:1"></div>
      <div class="lgnd"><span><i class="dot a"></i>Block A</span><span><i class="dot b"></i>Block B</span>
        <span><i class="dot key"></i>Key date</span>
        <span><i class="dot ok"></i>Done</span><span><i class="dot idle" style="background:transparent;box-shadow:inset 0 0 0 1.5px var(--idle)"></i>Not set</span></div>
    </div>
    <div class="gt-wrap"><div class="gt" id="gt"></div></div>
    <p class="note">Bars mirror the workbook's colour coding. Baseline is 15 June 2026 (week 25) — the plan opens in week 28.</p>`;
  $$('#gtFilter .chip').forEach(c=>{
    c.classList.toggle('on',c.dataset.f===(ST.gtFilter||'all'));
    c.onclick=()=>{ST.gtFilter=c.dataset.f;save();$$('#gtFilter .chip').forEach(x=>x.classList.toggle('on',x===c));buildGantt();};
  });
  buildGantt();
};
function buildGantt(){
  const gt=$('#gt');const f=ST.gtFilter||'all';
  let h=`<div class="gt-head">
    <div class="gt-months"><div class="mlab">Activity</div>${MONTHS.map(m=>`<div style="grid-column:span ${m[2]-m[1]+1}">${m[0]}</div>`).join('')}</div>
    <div class="gt-weeks"><div class="wlab"></div>${WEEKS.map(w=>`<div>${w}</div>`).join('')}</div>
  </div><div class="gt-body">`;
  // group by cat, preserving order
  const order=[];const groups={};
  DATA.timelineMain.forEach((x,i)=>{
    if(!x.s) return;
    if(f==='a'&&x.c!=='a') return;
    if(f==='b'&&x.c!=='b') return;
    if(f==='key'&&x.c!=='key') return;
    const c=x.cat||'General';
    if(!groups[c]){groups[c]=[];order.push(c);}
    groups[c].push({x,i});
  });
  if(!order.length){gt.innerHTML=h+`<div class="empty">No activities match this filter.</div></div>`;return;}
  order.forEach(c=>{
    const rows=groups[c];const col=(ST.collapsed['g_'+c]);
    h+=`<div class="g-grp"><div class="g-grp-h ${col?'col':''}" data-g="${esc(c)}">
      <span class="tw">▼</span><span>${esc(c)}</span><span class="cnt">${rows.length}</span></div>
      <div class="g-rows ${col?'hide':''}" data-rows="${esc(c)}">`;
    rows.forEach(({x,i})=>{
      const id='m'+i;const st=statOf(id);const sc=STAT.find(s=>s.k===st).cls;
      const sub=/^(i+\.|iv\.|v\.|vi\.|\d\.)/.test(x.act.trim())||x.act.trim().startsWith('i.');
      h+=`<div class="g-row"><div class="g-lab">
        <span class="st ${sc}" data-id="${id}" title="${STAT.find(s=>s.k===st).label} — click to change"></span>
        <span class="tx ${sub?'sub':''}" title="${esc(x.act)}${x.pic?' · '+esc(x.pic):''}">${esc(x.act)}</span>
      </div><div class="g-track">`;
      for(let k=0;k<24;k++) h+=`<div class="cell"></div>`;
      const s=Math.max(x.s,W0),e=Math.min(x.e,W1);
      if(x.c==='key'){
        const left=((s-W0)+0.5)/24*100;
        h+=`<div class="g-diamond" style="left:${left}%" title="${esc(x.act)}"></div>`;
      }else{
        const left=(s-W0)/24*100, width=(e-s+1)/24*100;
        h+=`<div class="g-bar ${x.c}" style="left:${left}%;width:calc(${width}% - 3px);margin-left:1.5px"
             title="${esc(x.act)} · W${x.s}–W${x.e}"></div>`;
      }
      h+=`</div></div>`;
    });
    h+=`</div></div>`;
  });
  gt.innerHTML=h+`</div>`;
  $$('.g-grp-h',gt).forEach(g=>g.onclick=()=>{
    const c=g.dataset.g;ST.collapsed['g_'+c]=!ST.collapsed['g_'+c];save();
    g.classList.toggle('col');$(`.g-rows[data-rows="${CSS.escape(c)}"]`,gt).classList.toggle('hide');
  });
  $$('.g-lab .st',gt).forEach(d=>d.onclick=e=>{
    e.stopPropagation();cycle(d.dataset.id);
    const st=statOf(d.dataset.id),o=STAT.find(s=>s.k===st);
    d.className='st '+o.cls;d.title=o.label+' — click to change';
  });
}

/* =================================================================== BUDGET */
renderers.budget=function(){
  const v=$('#v-budget');
  const rowsA=DATA.costA.map(r=>({...r,blk:'A'})), rowsB=DATA.costB.map(r=>({...r,blk:'B'}));
  const all=[...rowsA,...rowsB];
  v.innerHTML=`
    <div class="sec-h"><span class="eyebrow">Cost breakdown</span><h2>Bill of quantities — costed lines</h2>
      <span class="sub">${all.length} priced items · RM ${fmt(DATA.budget.total)} total</span></div>
    <div class="tbl-ctl">
      <input class="srch" id="budSrch" placeholder="Search location or activity…">
      <div class="chipset" id="budBlk">
        <button class="chip on" data-b="all">Both blocks</button>
        <button class="chip" data-b="A">Block A</button>
        <button class="chip" data-b="B">Block B</button>
      </div>
      <div class="chipset" id="budPh">
        <button class="chip on" data-p="all">All phases</button>
        <button class="chip" data-p="P1">P1</button>
        <button class="chip" data-p="P2">P2</button>
        <button class="chip" data-p="P3">P3</button>
      </div>
    </div>
    <div class="tbl-wrap"><table id="budTbl"></table></div>
    <p class="note">Only line items with an estimated cost in the workbook appear here. Items marked “separate from tender”
      or descriptive-only rows are excluded, so section subtotals reflect costed scope.</p>`;
  const state={q:'',b:'all',p:'all'};
  const draw=()=>{
    const rows=all.filter(r=>
      (state.b==='all'||r.blk===state.b)&&
      (state.p==='all'||r.phase===state.p)&&
      (!state.q|| (r.loc+' '+r.act).toLowerCase().includes(state.q)) );
    const sum=rows.reduce((a,r)=>a+r.cost,0);
    let h=`<thead><tr>
      <th>Block</th><th>Location / scope</th><th>Type</th><th>Qty</th><th>Phase</th><th class="num">Est. cost</th>
      </tr></thead><tbody>`;
    if(!rows.length) h+=`<tr><td colspan="6"><div class="empty">No lines match.</div></td></tr>`;
    rows.forEach(r=>{
      h+=`<tr>
        <td><span class="pill ${r.blk==='A'?'p2':'rel'}">Block ${r.blk}</span></td>
        <td class="loc">${esc(r.loc)}<div style="font-size:11px;color:var(--ink-3);font-weight:400;margin-top:2px">${esc(r.desc)}</div></td>
        <td><span class="pill ${/relocat/i.test(r.act)?'rel':'buy'}">${esc(r.act||'—')}</span></td>
        <td>${esc(r.qty||'—')}</td>
        <td><span class="pill ${(r.phase||'na').toLowerCase()}">${esc(r.phase||'—')}</span></td>
        <td class="num">${fmt(r.cost)}</td></tr>`;
    });
    h+=`</tbody><tfoot><tr><td colspan="5">Subtotal · ${rows.length} item${rows.length!==1?'s':''}</td>
      <td class="num">RM ${fmt(sum)}</td></tr></tfoot>`;
    $('#budTbl').innerHTML=h;
  };
  $('#budSrch').oninput=e=>{state.q=e.target.value.toLowerCase().trim();draw();};
  $$('#budBlk .chip').forEach(c=>c.onclick=()=>{state.b=c.dataset.b;$$('#budBlk .chip').forEach(x=>x.classList.toggle('on',x===c));draw();});
  $$('#budPh .chip').forEach(c=>c.onclick=()=>{state.p=c.dataset.p;$$('#budPh .chip').forEach(x=>x.classList.toggle('on',x===c));draw();});
  draw();
};

/* =================================================================== HIRING */

  const v=$('#v-hiring');
  const hc=DATA.headcount;
  const tot=hc.reduce((a,h)=>({rto:a.rto+(h.rto||0),hired:a.hired+(h.hired||0),var:a.var+(h.var||0)}),{rto:0,hired:0,var:0});

    <div class="sec-h"><span class="eyebrow">Manpower</span><h2>Hiring vs. requirement</h2>
      <span class="sub">ramp-up to 20 JPH capacity</span></div>
    <div class="kpis">
      <div class="kpi ok"><div class="lab">Positions filled</div><div class="val">${tot.hired}<small> / ${tot.rto}</small></div>
        <div class="foot">${Math.round(tot.hired/tot.rto*100)}% of required headcount</div></div>
      <div class="kpi ${tot.var>0?'a':'ok'}"><div class="lab">Open variance</div><div class="val">${tot.var}</div>
        <div class="foot">${tot.var>0?'positions still to fill':'fully staffed'}</div></div>
      <div class="kpi b"><div class="lab">Categories</div><div class="val">${hc.length}</div>
        <div class="foot">Exec · Non-Exec · Operator</div></div>
    </div>

      ${hc.map(h=>{const pct=Math.round((h.hired/h.rto)*100);
        return `<div class="hb">
          <div class="top"><span class="lv">${esc(h.lvl)}</span>
            <span class="fig"><b>${h.hired}</b> / ${h.rto} hired · <span class="${h.var>0?'var-gap':'var-ok'}">${h.var>0?h.var+' open':'complete'}</span></span></div>
          <div class="trk"><div class="fill" style="width:${pct}%">${pct}%</div></div>
          <div class="dept">${esc(h.dept)}</div></div>`;}).join('')}

/* =================================================================== BQ / EQUIPMENT */
renderers.bq=function(){
  const v=$('#v-bq');
  const groups={};const order=[];
  DATA.equipment.forEach(e=>{if(!groups[e.grp]){groups[e.grp]=[];order.push(e.grp);}groups[e.grp].push(e);});
  v.innerHTML=`
    <div class="sec-h"><span class="eyebrow">Equipment set-up</span><h2>Line equipment &amp; jigs</h2>
      <span class="sub">JPH adjustment 14 → 24 · ${DATA.equipment.length} items across ${order.length} lines</span></div>
    <div class="eq-grid">${order.map(g=>`
      <div class="card eq"><h3>${esc(g)}</h3>
        ${groups[g].map(e=>`<div class="er"><span>${esc(e.item)}</span><span class="q">${e.qty} ${esc(e.unit)}</span></div>`).join('')}
      </div>`).join('')}</div>`;
};

/* ---- helpers ---- */
function fmtDate(s){if(!s)return'';const[y,m,d]=s.split('-');const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return d+' '+mo[+m-1];}
function shortCat(c){return (c||'').replace(/^Operation Area\s*-\s*/,'').replace(/\s*&\s*Agreement/,'').trim()||'General';}
function pillCat(c){if(/legal/i.test(c))return'p1';if(/util/i.test(c))return'p2';return'p3';}

/* ---- export / import ---- */
$('#exportBtn').onclick=()=>{
  const blob=new Blob([JSON.stringify({app:LS,exported:new Date().toISOString(),status:ST.status},null,2)],{type:'application/json'});
  const a=el('a');a.href=URL.createObjectURL(blob);a.download='relocation-status-backup.json';a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),2000);
};
$('#importBtn').onclick=()=>$('#fileIn').click();
$('#fileIn').onchange=e=>{
  const f=e.target.files[0];if(!f)return;const rd=new FileReader();
  rd.onload=()=>{try{const j=JSON.parse(rd.result);if(j.status){ST.status=j.status;save();
    Object.keys(rendered).forEach(k=>rendered[k]=false);go(ST.tab);alert('Status restored.');}
    else alert('No status data in that file.');}catch(x){alert('Could not read that file.');}};
  rd.readAsText(f);e.target.value='';
};

/* ---- boot ---- */
renderers.overview();rendered.overview=true;
go(ST.tab||'overview');
})();
</script>
